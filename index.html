<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app"> 
    <div class="panel">
      <!-- 타이틀, 헤더 -->
      <!--  
      <div class="title">
        <p class="subtitle">WEB PROJECT</p>
        <h2>배경화면을 만들어보세요!</h2>
      </div>
      -->

      <section class="button-grid">
        <button class="None">추가 기능</button>
        <button type="button" id="randomUnlocked">고정 제외 랜덤</button>
        <button type="button" id="copyCode">코드 복사</button>
        <button type="button" id="applyCode">코드 적용</button>
      </section>

      <section class="control">
        <label for="shareCode">Code</label>
        <textarea id="shareCode" rows="1" spellcheck="false" placeholder="복사한 코드를 입력하세요"></textarea>
      </section>

      <section class="control">
        <label for="textInput">텍스트</label>
        <textarea id="textInput">MAKE YOUR WALLPAPER</textarea>
      </section>

      <section class="control">
        <div title="폰트의 스타일을 결정합니다.">
          <label for="fontSelect">폰트
            <input type="checkbox" id="lockFont">잠금
          </label>
          <label class="lock"></label>
        </div>
        
        <select id="fontSelect">
          <option value="Arial, sans-serif">Arial</option>
          <option value="'Times New Roman', serif">Times New Roman</option>
          <option value="'Courier New', monospace">Courier New</option>
          <option value="Impact, sans-serif">Impact</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
          <option value="'Malgun Gothic', sans-serif">맑은 고딕</option>
        </select>
      </section>

      <!-- 폰트 크기 설정 -->
      <section class="control">
        <div title="폰트의 크기를 결정합니다.">
          <label for="fontSize">크기</label>
          <label class="lock">
            <input type="checkbox" id="lockSize">잠금
          </label>
        </div>
        <input type="range" id="fontSize" min="30" max="210" value="120">
        <output id="fontSizeValue">120px</output>
      </section>

      <section class="control">
        <div title="텍스트의 컬러를 결정합니다."> 
          <label for="fontColor">색</label>
          <label class="lock">
            <input type="checkbox" id="lockColor">잠금
          </label>
        </div>
        <input type="color" id="fontColor" value="#f7f0df">
      </section>

      <section class="control">
        <div title="배경의 색상을 결정합니다.">
          <label for="bgColor">배경색</label>
          <label class="lock">
            <input type="checkbox" id="lockBg">잠금
          </label>
        </div>
        <input type="color" id="bgColor" value="#181818">
      </section>

      <section class="control">
        <div title="텍스트의 위치를 결정합니다.">
          <label>위치</label>
          <label class="lock">
            <input type="checkbox" id="lockPos">잠금
          </label>
        </div>
        <div class="split">
          <label for="posX">X <input type="range" id="posX" min="0" max="100" value="50"></label>
          <label for="posY">Y <input type="range" id="posY" min="0" max="100" value="50"></label>
        </div>
      </section>

      <!-- 레이아웃 설정 -->
      <section class="control">
        <label for="layoutSelect">레이아웃</label>
        <select id="layoutSelect">
          <option value="center">중앙 정렬</option>
          <option value="leftTop">왼쪽 상단</option>
          <option value="rightBottom">오른쪽 하단</option>
          <option value="vertical">세로 타이포</option>
          <option value="repeat">반복 패턴</option>
        </select>
      </section>
    </div>

    <!-- 배경 미리보기 -->
    <section class="workspace">
      <div class="toolbar">
        <button type="button" id="download">PNG 저장</button>
        <strong>1920 x 1080</strong>
      </div>

      <div class="preview">
        <div class="wallpaper" id="wallpaper">
          <div class="wallpaper-text" id="wallpaperText">MAKE YOUR WALLPAPER</div>
        </div>
      </div>
    </section>
  </div>
</body>
<script src="script.js"></script>
</html>
